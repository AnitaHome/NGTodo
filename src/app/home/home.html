<div class="min-h-screen bg-gray-50 py-10 px-4">
  <div class="max-w-lg mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">待辦事項清單</h1>

    <!-- Stats Banner -->
    <div class="grid grid-cols-3 gap-3 mb-6" role="status" aria-label="任務統計">
      <div class="bg-white border border-gray-200 rounded-lg px-4 py-3 shadow-sm text-center">
        <p class="text-2xl font-bold text-gray-800">{{ totalCount() }}</p>
        <p class="text-xs text-gray-500 mt-1">總計</p>
      </div>
      <div class="bg-white border border-blue-200 rounded-lg px-4 py-3 shadow-sm text-center">
        <p class="text-2xl font-bold text-blue-600">{{ pendingCount() }}</p>
        <p class="text-xs text-blue-500 mt-1">待完成</p>
      </div>
      <div class="bg-white border border-green-200 rounded-lg px-4 py-3 shadow-sm text-center">
        <p class="text-2xl font-bold text-green-600">{{ completedCount() }}</p>
        <p class="text-xs text-green-500 mt-1">已完成</p>
      </div>
    </div>

    <!-- Add Todo -->
    <div class="flex gap-2 mb-6">
      <input
        type="text"
        [(ngModel)]="newTodo"
        (keydown.enter)="addTodo()"
        placeholder="請輸入待辦事項..."
        class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400"
        aria-label="新增待辦事項"
      />
      <button
        (click)="addTodo()"
        class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-5 py-2 rounded-lg transition-colors"
      >
        新增
      </button>
    </div>

    <!-- Todo List -->
    @if (sortedTodos().length === 0) {
      <p class="text-center text-gray-400">尚無待辦事項，請新增一個吧！</p>
    } @else {
      <ul class="space-y-3">
        @for (todo of sortedTodos(); track todo.id) {
          <li
            class="flex items-center gap-3 bg-white border rounded-lg px-4 py-3 shadow-sm"
            [class.border-gray-200]="!todo.completed"
            [class.border-green-200]="todo.completed"
            [class.bg-green-50]="todo.completed"
          >
            <input
              type="checkbox"
              [id]="'todo-' + todo.id"
              [checked]="todo.completed"
              (change)="toggleTodo(todo.id)"
              class="w-4 h-4 accent-green-500 cursor-pointer flex-shrink-0"
              [attr.aria-label]="(todo.completed ? '已完成' : '待完成') + '：' + todo.text"
            />
            @if (todo.editing) {
              <input
                type="text"
                [(ngModel)]="todo.editText"
                (keydown)="onKeydown($event, todo)"
                class="flex-1 border border-gray-300 rounded px-3 py-1 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400"
                autofocus
              />
              <button
                (click)="saveEdit(todo)"
                class="text-green-600 hover:text-green-800 font-semibold text-sm"
              >儲存</button>
              <button
                (click)="cancelEdit(todo)"
                class="text-gray-400 hover:text-gray-600 text-sm"
              >取消</button>
            } @else {
              <label
                [for]="'todo-' + todo.id"
                class="flex-1 cursor-pointer"
                [class.text-gray-400]="todo.completed"
                [class.line-through]="todo.completed"
                [class.text-gray-700]="!todo.completed"
              >{{ todo.text }}</label>
              @if (!todo.completed) {
                <button
                  (click)="startEdit(todo)"
                  class="text-blue-500 hover:text-blue-700 text-sm font-medium"
                >編輯</button>
              }
              <button
                (click)="deleteTodo(todo.id)"
                class="text-red-500 hover:text-red-700 text-sm font-medium"
              >刪除</button>
            }
          </li>
        }
      </ul>
    }
  </div>
</div>
